<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Quest: Dragon Battle ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Запрещаем скролл и свайпы */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: pan-x pan-y; /* разрешаем только касания внутри элементов, но не скролл страницы */
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0b0b2b, #020617);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', 'Comic Neue', 'Chalkboard SE', cursive;
            padding: 12px;
        }

        /* Игровой контейнер на всю высоту с flex, чтобы не вылезал */
        .game-container {
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 14px 16px;
            width: 100%;
            max-width: 650px;
            height: auto;
            max-height: 98%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,200,100,0.3) inset;
            border: 1px solid rgba(255,180,80,0.4);
            overflow-y: auto;   /* если контента слишком много - скролл внутри, но не страницы, но постараемся уместить */
            scrollbar-width: thin;
        }
        /* Убираем полосу прокрутки на WebKit, но она останется тонкой, если сильно переполнит */
        .game-container::-webkit-scrollbar {
            width: 4px;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #FFD966, #FFA559, #FF6E46);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        .sub {
            text-align: center;
            color: #FFE5B4;
            font-weight: 500;
            font-size: 0.7rem;
            margin-bottom: 12px;
        }

        /* Полоски здоровья */
        .health-bars {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .health-card {
            flex: 1;
            background: rgba(0,0,0,0.55);
            border-radius: 28px;
            padding: 6px 8px;
            text-align: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-bottom: 2px solid gold;
        }

        .health-card .label {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: #fff0c0;
        }

        .health-bar-bg {
            background: #3a1f1f;
            border-radius: 30px;
            height: 14px;
            margin-top: 6px;
            overflow: hidden;
        }

        .health-bar-fill {
            width: 100%;
            height: 100%;
            transition: width 0.25s ease;
            border-radius: 30px;
        }

        .player .health-bar-fill { background: linear-gradient(90deg, #4cd964, #2ecc71); }
        .dragon .health-bar-fill { background: linear-gradient(90deg, #e67e22, #e74c3c); }

        .hp-text {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #ffd966;
        }

        /* Арена */
        .arena {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 40px;
            padding: 14px 12px;
            margin: 10px 0;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .question-card {
            background: linear-gradient(145deg, #FFF2DF, #FFE4B5);
            font-size: 2rem;
            font-weight: bold;
            padding: 20px 8px;
            border-radius: 50px;
            font-family: monospace;
            color: #3b2a1f;
            margin-bottom: 16px;
            box-shadow: 0 6px 0 #b97f40;
            word-break: break-word;
        }

        .answer-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        #answerInput {
            font-size: 1.4rem;
            width: 140px;
            text-align: center;
            padding: 10px;
            border-radius: 50px;
            border: none;
            background: #FFF8E7;
            font-weight: bold;
            font-family: monospace;
            outline: none;
            box-shadow: 0 4px 0 #ca9622;
        }

        button {
            background: linear-gradient(135deg, #FFB347, #FF8C00);
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 50px;
            color: #2c1a0c;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #8B5A2B;
            font-family: inherit;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8B5A2B;
        }

        .timer {
            background: #000000aa;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 16px;
            border-radius: 50px;
            color: #FFE484;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 6px auto;
            font-family: monospace;
            backdrop-filter: blur(8px);
        }

        .message {
            background: #1e1a2fcc;
            border-radius: 36px;
            padding: 10px 14px;
            color: #FFE6B0;
            font-weight: bold;
            margin: 12px 0;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border-left: 4px solid #FFB347;
        }

        .difficulty {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 12px 0 8px;
        }

        .diff-btn {
            font-size: 0.8rem;
            background: #251f1a;
            color: #FFD966;
            box-shadow: 0 3px 0 #4a2e1a;
            padding: 6px 14px;
            border-radius: 40px;
        }
        .diff-btn.active {
            background: linear-gradient(135deg, #FFAA33, #FF7700);
            color: white;
            transform: translateY(1px);
            box-shadow: 0 2px 0 #9b4a1a;
        }

        .new-game {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            width: 70%;
            margin: 6px auto 0;
            display: block;
            box-shadow: 0 4px 0 #1f6e43;
            font-size: 1rem;
            padding: 8px 12px;
        }

        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #C9AE7A;
            margin-top: 10px;
        }

        /* Анимации */
        @keyframes shakeEffect {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
        .dragon-attack { animation: shakeEffect 0.3s ease; }
        @keyframes hitFlash {
            0% { background: #ffa500; }
            100% { background: #FFF2DF; }
        }
        .player-attack { animation: hitFlash 0.2s linear; }
        .question-pop { animation: pop 0.25s ease; }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Обеспечиваем, чтобы даже на iPhone 11 всё влезало без скролла */
        @media (max-width: 600px) {
            .game-container {
                padding: 12px 12px;
                border-radius: 36px;
            }
            h1 { font-size: 1.4rem; }
            .sub { font-size: 0.65rem; margin-bottom: 8px; }
            .health-bars { gap: 8px; margin-bottom: 10px; }
            .health-card { padding: 4px 6px; }
            .health-card .label { font-size: 0.75rem; }
            .health-bar-bg { height: 12px; }
            .hp-text { font-size: 0.6rem; }
            .arena { padding: 10px 8px; margin: 6px 0; }
            .question-card { font-size: 1.8rem; padding: 16px 6px; margin-bottom: 12px; }
            .answer-area { gap: 8px; margin-bottom: 10px; }
            #answerInput { width: 120px; font-size: 1.2rem; padding: 8px; }
            button { font-size: 1rem; padding: 6px 16px; }
            .timer { font-size: 1rem; padding: 3px 12px; }
            .message { font-size: 0.7rem; padding: 8px 10px; margin: 8px 0; }
            .difficulty { gap: 8px; margin: 8px 0 4px; }
            .diff-btn { font-size: 0.7rem; padding: 5px 10px; }
            .new-game { width: 80%; font-size: 0.9rem; }
            footer { font-size: 0.55rem; margin-top: 8px; }
        }
        @media (max-width: 450px) {
            .question-card { font-size: 1.5rem; }
            .difficulty { flex-direction: row; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>⚡ MATH QUEST: DRAGON'S CURSE ⚡</h1>
    <div class="sub">Математический поединок с древним драконом</div>

    <div class="health-bars">
        <div class="health-card player">
            <div class="label">🛡️ ГЕРОЙ</div>
            <div class="health-bar-bg"><div class="health-bar-fill" id="playerHealthFill" style="width: 100%"></div></div>
            <div class="hp-text"><span id="playerHpText">100</span> / 100</div>
        </div>
        <div class="health-card dragon">
            <div class="label">🐉 ДРАКОН</div>
            <div class="health-bar-bg"><div class="health-bar-fill" id="dragonHealthFill" style="width: 100%"></div></div>
            <div class="hp-text"><span id="dragonHpText">100</span> / 100</div>
        </div>
    </div>

    <div class="arena">
        <div class="question-card" id="questionText">0 + 0</div>
        <div class="answer-area">
            <input type="number" id="answerInput" placeholder="?" autofocus>
            <button id="submitBtn">✨ АТАКА ✨</button>
        </div>
        <div class="timer">⏳ <span id="timerValue">0</span> сек</div>
    </div>

    <div class="message" id="messageBox">⚔️ Введи ответ и нажми Enter ⚔️</div>

    <div class="difficulty">
        <button class="diff-btn active" data-diff="easy">🍎 ЛЁГКИЙ</button>
        <button class="diff-btn" data-diff="hard">🔥 СЛОЖНЫЙ</button>
    </div>

    <button class="new-game" id="newGameBtn">🔄 НОВАЯ БИТВА</button>
    <footer>⚔️ Верный ответ — 10 урона. Ошибка/таймаут — контратака ⚔️</footer>
</div>

<script>
    // ---------- ЛОГИКА ИГРЫ ----------
    let playerHP = 100;
    let dragonHP = 100;
    let currentDifficulty = "easy";
    let currentQuestion = { text: "", answer: 0 };
    let timeLeft = 0;
    let timerInterval = null;
    let isWaitingForAnswer = true;
    let gameActive = true;
    const maxStartHP = 100;

    const playerHpText = document.getElementById("playerHpText");
    const dragonHpText = document.getElementById("dragonHpText");
    const playerFill = document.getElementById("playerHealthFill");
    const dragonFill = document.getElementById("dragonHealthFill");
    const questionDiv = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");
    const timerSpan = document.getElementById("timerValue");
    const newGameBtn = document.getElementById("newGameBtn");
    const diffBtns = document.querySelectorAll(".diff-btn");

    function updateHealthBars() {
        let playerPercent = (playerHP / maxStartHP) * 100;
        let dragonPercent = (dragonHP / maxStartHP) * 100;
        playerFill.style.width = `${playerPercent}%`;
        dragonFill.style.width = `${dragonPercent}%`;
        playerHpText.innerText = Math.max(0, playerHP);
        dragonHpText.innerText = Math.max(0, dragonHP);
    }

    function getTimeForDifficulty() {
        return currentDifficulty === "easy" ? 15 : 12;
    }

    function generateEasyQuestion() {
        const ops = ['+', '-', '*', '/'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        let a, b, answer, text;
        if (op === '+') {
            a = Math.floor(Math.random() * 20) + 1;
            b = Math.floor(Math.random() * 20) + 1;
            answer = a + b;
            text = `${a} + ${b}`;
        } else if (op === '-') {
            a = Math.floor(Math.random() * 20) + 1;
            b = Math.floor(Math.random() * a) + 1;
            answer = a - b;
            text = `${a} - ${b}`;
        } else if (op === '*') {
            a = Math.floor(Math.random() * 10) + 1;
            b = Math.floor(Math.random() * 10) + 1;
            answer = a * b;
            text = `${a} × ${b}`;
        } else {
            b = Math.floor(Math.random() * 9) + 1;
            answer = Math.floor(Math.random() * 10) + 1;
            a = b * answer;
            text = `${a} ÷ ${b}`;
        }
        return { text, answer };
    }

    function generateHardQuestion() {
        const types = ['square', 'cube', 'sqrt'];
        const type = types[Math.floor(Math.random() * types.length)];
        let text, answer;
        if (type === 'square') {
            let base = Math.floor(Math.random() * 12) + 2;
            answer = base * base;
            text = `${base}²`;
        } else if (type === 'cube') {
            let base = Math.floor(Math.random() * 8) + 2;
            answer = base * base * base;
            text = `${base}³`;
        } else {
            const perfect = [4,9,16,25,36,49,64,81,100,121,144];
            let idx = Math.floor(Math.random() * perfect.length);
            let num = perfect[idx];
            answer = Math.sqrt(num);
            text = `√${num}`;
        }
        return { text, answer };
    }

    function generateQuestion() {
        return currentDifficulty === "easy" ? generateEasyQuestion() : generateHardQuestion();
    }

    function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
    }

    function startTimerForQuestion() {
        stopTimer();
        if (!gameActive) return;
        timeLeft = getTimeForDifficulty();
        timerSpan.innerText = timeLeft;
        timerInterval = setInterval(() => {
            if (!gameActive || !isWaitingForAnswer) return;
            if (timeLeft <= 1) {
                clearInterval(timerInterval);
                timerInterval = null;
                if (gameActive && isWaitingForAnswer) handleTimeout();
            } else {
                timeLeft--;
                timerSpan.innerText = timeLeft;
            }
        }, 1000);
    }

    function handleTimeout() {
        if (!gameActive || !isWaitingForAnswer) return;
        isWaitingForAnswer = false;
        stopTimer();
        let damage = 10;
        playerHP = Math.max(0, playerHP - damage);
        updateHealthBars();
        messageBox.innerHTML = `⏰ МЕДЛИШЬ! Дракон наносит ${damage} урона!`;
        messageBox.style.background = "#8b2c2ccc";
        document.querySelector(".player").classList.add("dragon-attack");
        setTimeout(() => document.querySelector(".player").classList.remove("dragon-attack"), 400);
        checkGameOver();
        if (gameActive) setTimeout(() => nextRound(), 1500);
    }

    function checkGameOver() {
        if (playerHP <= 0) {
            gameActive = false;
            stopTimer();
            messageBox.innerHTML = "💀 ТЫ ПОВЕРЖЕН... Дракон победил. Новая игра? 💀";
            messageBox.style.background = "#4a0000cc";
            answerInput.disabled = true;
            submitBtn.disabled = true;
            return true;
        } else if (dragonHP <= 0) {
            gameActive = false;
            stopTimer();
            messageBox.innerHTML = "🏆 ПОБЕДА! Ты одолел дракона! Великий математик! 🏆";
            messageBox.style.background = "#1f5a2ecc";
            answerInput.disabled = true;
            submitBtn.disabled = true;
            return true;
        }
        return false;
    }

    function nextRound() {
        if (!gameActive) return;
        currentQuestion = generateQuestion();
        questionDiv.innerText = currentQuestion.text;
        questionDiv.classList.add("question-pop");
        setTimeout(() => questionDiv.classList.remove("question-pop"), 300);
        answerInput.value = "";
        isWaitingForAnswer = true;
        startTimerForQuestion();
        messageBox.style.background = "#1e1a2fcc";
        messageBox.innerHTML = "🐉 Следующий пример! Введи ответ!";
        answerInput.focus();
    }

    function handleAnswer() {
        if (!gameActive || !isWaitingForAnswer) return;
        let raw = answerInput.value.trim();
        if (raw === "") { messageBox.innerHTML = "📝 Введи число!"; return; }
        let userNum = Number(raw);
        if (isNaN(userNum)) { messageBox.innerHTML = "❌ Введи число!"; return; }
        isWaitingForAnswer = false;
        stopTimer();

        if (userNum === currentQuestion.answer) {
            let damage = 10;
            dragonHP = Math.max(0, dragonHP - damage);
            updateHealthBars();
            messageBox.innerHTML = `✨ ВЕРНО! Урон ${damage} по дракону! ✨`;
            messageBox.style.background = "#2a6b2fcc";
            document.querySelector(".dragon").classList.add("player-attack");
            setTimeout(() => document.querySelector(".dragon").classList.remove("player-attack"), 300);
            let ended = checkGameOver();
            if (!ended && gameActive) setTimeout(() => nextRound(), 800);
            else if (ended) { answerInput.disabled = true; submitBtn.disabled = true; }
        } else {
            let damage = 10;
            playerHP = Math.max(0, playerHP - damage);
            updateHealthBars();
            messageBox.innerHTML = `❌ НЕВЕРНО! Ответ: ${currentQuestion.answer}. Дракон атакует!`;
            messageBox.style.background = "#8b2c2ccc";
            document.querySelector(".player").classList.add("dragon-attack");
            setTimeout(() => document.querySelector(".player").classList.remove("dragon-attack"), 400);
            let ended = checkGameOver();
            if (!ended && gameActive) setTimeout(() => nextRound(), 1500);
            else if (ended) { answerInput.disabled = true; submitBtn.disabled = true; }
        }
    }

    function newGame() {
        stopTimer();
        gameActive = true;
        isWaitingForAnswer = true;
        playerHP = maxStartHP;
        dragonHP = maxStartHP;
        updateHealthBars();
        currentQuestion = generateQuestion();
        questionDiv.innerText = currentQuestion.text;
        answerInput.value = "";
        answerInput.disabled = false;
        submitBtn.disabled = false;
        messageBox.style.background = "#1e1a2fcc";
        messageBox.innerHTML = "⚔️ Новая битва! Решай быстрее! ⚔️";
        startTimerForQuestion();
        answerInput.focus();
    }

    function setDifficulty(level) {
        currentDifficulty = level;
        diffBtns.forEach(btn => {
            if (btn.getAttribute("data-diff") === level) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        newGame();
    }

    function init() {
        newGame();
        submitBtn.addEventListener("click", handleAnswer);
        newGameBtn.addEventListener("click", newGame);
        answerInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") { e.preventDefault(); handleAnswer(); }
        });
        diffBtns.forEach(btn => {
            btn.addEventListener("click", () => setDifficulty(btn.getAttribute("data-diff")));
        });
    }
    init();
</script>
</body>
</html>
